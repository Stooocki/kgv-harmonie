backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "news"
    label: "News & Aktuelles"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Kategorie", name: "tag", widget: "string", default: "Vereinsnews" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
